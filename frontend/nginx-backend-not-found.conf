location /api {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}
location /docs {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
}
location /redoc {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
}
